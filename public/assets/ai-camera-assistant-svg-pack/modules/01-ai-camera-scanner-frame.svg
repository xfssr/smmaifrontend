<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" fill="none" role="img" aria-label="AI Camera Scanner Frame">

  <defs>
    <linearGradient id="glass-panel" x1="38" y1="588" x2="352" y2="676" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242833" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#12151C" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="scan-line-gradient" x1="32" y1="0" x2="358" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35F2A6" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#35F2A6" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#35F2A6" stop-opacity="0"/>
    </linearGradient>
    <filter id="green-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#35F2A6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="camera-frame-clip">
      <rect x="18" y="70" width="354" height="620" rx="30"/>
    </clipPath>
    <path id="arrow-up-path" d="M0 -12 L9 0 H4 V13 H-4 V0 H-9 Z"/>
    <path id="arrow-left-path" d="M-12 0 L0 -9 V-4 H13 V4 H0 V9 Z"/>
    <path id="rotate-left-path" d="M13 -8 C5 -17 -11 -12 -12 2 C-13 14 2 21 11 13 M13 -8 V-18 M13 -8 H3"/>
    <path id="rotate-right-path" d="M-13 -8 C-5 -17 11 -12 12 2 C13 14 -2 21 -11 13 M-13 -8 V-18 M-13 -8 H-3"/>
  </defs>


  <g id="ai-camera-scanner-frame">
    <rect x="18" y="70" width="354" height="620" rx="30" fill="#12151C" fill-opacity="0.30"/>
    <rect x="18.5" y="70.5" width="353" height="619" rx="29.5" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <g clip-path="url(#camera-frame-clip)">
      <rect x="18" y="70" width="354" height="620" fill="#090B10" opacity="0.24"/>
      <g opacity="0.17">
        <line x1="77" y1="70" x2="77" y2="690" stroke="#FFFFFF" stroke-opacity="0.34"/>
        <line x1="136" y1="70" x2="136" y2="690" stroke="#FFFFFF" stroke-opacity="0.24"/>
        <line x1="195" y1="70" x2="195" y2="690" stroke="#FFFFFF" stroke-opacity="0.32"/>
        <line x1="254" y1="70" x2="254" y2="690" stroke="#FFFFFF" stroke-opacity="0.24"/>
        <line x1="313" y1="70" x2="313" y2="690" stroke="#FFFFFF" stroke-opacity="0.34"/>
        <line x1="18" y1="173" x2="372" y2="173" stroke="#FFFFFF" stroke-opacity="0.28"/>
        <line x1="18" y1="276" x2="372" y2="276" stroke="#FFFFFF" stroke-opacity="0.20"/>
        <line x1="18" y1="379" x2="372" y2="379" stroke="#FFFFFF" stroke-opacity="0.28"/>
        <line x1="18" y1="482" x2="372" y2="482" stroke="#FFFFFF" stroke-opacity="0.20"/>
        <line x1="18" y1="585" x2="372" y2="585" stroke="#FFFFFF" stroke-opacity="0.28"/>
      </g>
      <rect x="32" y="96" width="326" height="2" rx="1" fill="url(#scan-line-gradient)" filter="url(#green-glow)">
        <animate attributeName="y" values="96;654;96" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.15;0.8;0.15" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="32" y="96" width="326" height="42" rx="21" fill="#35F2A6" opacity="0.06" filter="url(#soft-blur)">
        <animate attributeName="y" values="78;636;78" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.02;0.08;0.02" dur="6s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g filter="url(#green-glow)" stroke="#35F2A6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M47 116 V95 Q47 88 54 88 H76">
        <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
      </path>
      <path d="M314 88 H336 Q343 88 343 95 V116">
        <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" begin="0.25s" repeatCount="indefinite"/>
      </path>
      <path d="M47 644 V665 Q47 672 54 672 H76">
        <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
      </path>
      <path d="M314 672 H336 Q343 672 343 665 V644">
        <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" begin="0.75s" repeatCount="indefinite"/>
      </path>
    </g>
    <rect x="18.5" y="70.5" width="353" height="619" rx="29.5" stroke="#FFFFFF" stroke-opacity="0.16"/>
  </g>

</svg>
