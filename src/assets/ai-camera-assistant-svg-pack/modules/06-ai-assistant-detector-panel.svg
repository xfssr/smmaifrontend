<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" fill="none" role="img" aria-label="Bottom AI Assistant Detector Panel">

  <defs>
    <linearGradient id="glass-panel" x1="38" y1="588" x2="352" y2="676" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#242833" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#12151C" stop-opacity="0.86"/>
    </linearGradient>
    <linearGradient id="scan-line-gradient" x1="32" y1="0" x2="358" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#35F2A6" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#35F2A6" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#35F2A6" stop-opacity="0"/>
    </linearGradient>
    <filter id="green-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#35F2A6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="camera-frame-clip">
      <rect x="18" y="70" width="354" height="620" rx="30"/>
    </clipPath>
    <path id="arrow-up-path" d="M0 -12 L9 0 H4 V13 H-4 V0 H-9 Z"/>
    <path id="arrow-left-path" d="M-12 0 L0 -9 V-4 H13 V4 H0 V9 Z"/>
    <path id="rotate-left-path" d="M13 -8 C5 -17 -11 -12 -12 2 C-13 14 2 21 11 13 M13 -8 V-18 M13 -8 H3"/>
    <path id="rotate-right-path" d="M-13 -8 C-5 -17 11 -12 12 2 C13 14 -2 21 -11 13 M-13 -8 V-18 M-13 -8 H-3"/>
  </defs>


  <g id="ai-assistant-detector-panel" filter="url(#soft-shadow)">
    <rect x="38" y="588" width="314" height="88" rx="28" fill="url(#glass-panel)"/>
    <rect x="38.5" y="588.5" width="313" height="87" rx="27.5" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <circle cx="67" cy="620" r="6" fill="#35F2A6" filter="url(#green-glow)">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4.5;6.8;4.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="84" y="612" fill="#F4F5F7" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="800" letter-spacing="1.2">AI VISION DETECTOR</text>
    <text id="assistant-primary-message" x="84" y="630" fill="#A7ADBA" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600">Analyzing frame...
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.4s" repeatCount="indefinite"/>
    </text>
    <g id="assistant-rotating-status" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">
      <text x="58" y="654" fill="#757D8C" opacity="0">Object detected: person, chair, sky, water
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.18;0.3;0.76;1" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="58" y="654" fill="#757D8C" opacity="0">Center the object
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.1;0.28;0.4;1" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="58" y="654" fill="#757D8C" opacity="0">Hold steady
        <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.36;0.48;0.58;0.7;1" dur="8s" repeatCount="indefinite"/>
      </text>
      <text x="58" y="654" fill="#35F2A6" opacity="0">Good framing
        <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.62;0.72;0.8;0.88;1" dur="8s" repeatCount="indefinite"/>
      </text>
    </g>
    <rect x="274" y="608" width="54" height="26" rx="13" fill="#122019" fill-opacity="0.92"/>
    <rect x="274.5" y="608.5" width="53" height="25" rx="12.5" stroke="#35F2A6" stroke-opacity="0.28"/>
    <text x="301" y="625" text-anchor="middle" fill="#35F2A6" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="800" letter-spacing="0.8">SCAN</text>
  </g>

</svg>
